services:
  postgres:
    image: postgres:15-alpine
    container_name: urlshortener-db
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    expose:
      - "5432"
    networks:
      - private
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: urlshortener-redis
    restart: unless-stopped
    expose:
      - "6379"
    networks:
      - private
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: unless-stopped
    stop_grace_period: 35s
    env_file: .env
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
    expose:
      - "8000"
    networks:
      - public
      - private
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --no-access-log --timeout-graceful-shutdown 30

  frontend:
    build: ./frontend
    container_name: urlshortener-frontend
    restart: unless-stopped
    env_file: .env
    ports:
      - "80:80"
    networks:
      - public
    depends_on:
      - backend

networks:
  public:
    driver: bridge
  private:
    driver: bridge
    internal: true

volumes:
  postgres_data: