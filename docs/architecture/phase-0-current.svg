  <desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(11, 11, 11);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, BlinkMacSystemFont, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Architecture diagram showing Browser connecting over plain HTTP port 80 to Nginx inside a Frontend Docker container on a single AWS EC2 instance, which proxies to FastAPI in a Backend container, which connects to Redis and PostgreSQL containers.</desc>
