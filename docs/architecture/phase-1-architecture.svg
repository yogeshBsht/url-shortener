<svg viewBox="0 0 900 700" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#555"/>
    </marker>
  </defs>

  <rect width="900" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-size="18" font-weight="bold" fill="#1a1a2e">Phase 1 — Production-Ready Foundation (Single EC2)</text>

  <!-- Browser -->
  <rect x="370" y="50" width="160" height="40" rx="6" fill="#f0f4ff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="450" y="75" text-anchor="middle" font-size="13" fill="#1a1a2e">Browser (HTTP :80)</text>
  <line x1="450" y1="90" x2="450" y2="115" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- EC2 outer box -->
  <rect x="60" y="115" width="780" height="555" rx="10" fill="#fafafa" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="80" y="138" font-size="13" font-weight="bold" fill="#444">AWS EC2 Instance</text>

  <!-- Public network box -->
  <rect x="90" y="155" width="720" height="220" rx="8" fill="#eef6ff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="105" y="175" font-size="12" font-weight="bold" fill="#2b3a67">public network (bridge)</text>

  <!-- Frontend container -->
  <rect x="115" y="190" width="300" height="165" rx="6" fill="#ffffff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="265" y="210" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1a2e">frontend (nginx:alpine)</text>
  <text x="265" y="224" text-anchor="middle" font-size="10.5" fill="#666">published 80:80</text>

  <rect x="130" y="235" width="270" height="26" rx="4" fill="#f7f9ff" stroke="#c3cfff"/>
  <text x="265" y="252" text-anchor="middle" font-size="10.5" fill="#333">/  →  React SPA (static build)</text>

  <rect x="130" y="267" width="270" height="26" rx="4" fill="#f7f9ff" stroke="#c3cfff"/>
  <text x="265" y="284" text-anchor="middle" font-size="10.5" fill="#333">/api/  →  proxy → backend:8000</text>

  <rect x="130" y="299" width="270" height="20" rx="4" fill="#fff4e6" stroke="#f0b429"/>
  <text x="265" y="313" text-anchor="middle" font-size="9.5" fill="#7a4a00">limit_req: 10r/s, burst 20, nodelay → 429</text>

  <rect x="130" y="325" width="270" height="22" rx="4" fill="#f7f9ff" stroke="#c3cfff"/>
  <text x="265" y="340" text-anchor="middle" font-size="10.5" fill="#333">/docs  →  proxy → backend:8000/docs</text>

  <!-- Backend replicas -->
  <rect x="445" y="190" width="340" height="165" rx="6" fill="#ffffff" stroke="#4361ee" stroke-width="1.5"/>
  <text x="615" y="210" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1a2e">backend × 2 replicas (FastAPI/Uvicorn)</text>
  <text x="615" y="224" text-anchor="middle" font-size="10.5" fill="#666">expose 8000 (not published)</text>

  <rect x="460" y="235" width="310" height="22" rx="4" fill="#eefbf0" stroke="#8fd19e"/>
  <text x="615" y="250" text-anchor="middle" font-size="10" fill="#1c6b31">structlog JSON: request_id, path, status, duration_ms</text>

  <rect x="460" y="261" width="310" height="22" rx="4" fill="#eefbf0" stroke="#8fd19e"/>
  <text x="615" y="276" text-anchor="middle" font-size="10" fill="#1c6b31">X-Request-ID correlation across all logs</text>

  <rect x="460" y="287" width="310" height="22" rx="4" fill="#eefbf0" stroke="#8fd19e"/>
  <text x="615" y="302" text-anchor="middle" font-size="10" fill="#1c6b31">graceful shutdown: SIGTERM, 30s drain</text>

  <rect x="460" y="313" width="150" height="22" rx="4" fill="#f0f4ff" stroke="#4361ee"/>
  <text x="535" y="328" text-anchor="middle" font-size="9.5" fill="#1a1a2e">/health/live</text>

  <rect x="620" y="313" width="150" height="22" rx="4" fill="#f0f4ff" stroke="#4361ee"/>
  <text x="695" y="328" text-anchor="middle" font-size="9.5" fill="#1a1a2e">/health/ready</text>

  <!-- arrow frontend -> backend -->
  <line x1="415" y1="272" x2="445" y2="272" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Private network box -->
  <rect x="90" y="395" width="720" height="225" rx="8" fill="#fff0f0" stroke="#e85d75" stroke-width="1.5"/>
  <text x="105" y="415" font-size="12" font-weight="bold" fill="#8a2140">private network (internal: true — no external route)</text>

  <!-- backend link into private -->
  <line x1="615" y1="356" x2="615" y2="410" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="628" y="385" font-size="9.5" fill="#666">backend also attached here</text>

  <!-- Redis -->
  <rect x="130" y="430" width="290" height="150" rx="6" fill="#ffffff" stroke="#e85d75" stroke-width="1.5"/>
  <text x="275" y="452" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1a2e">redis:7-alpine</text>
  <text x="275" y="467" text-anchor="middle" font-size="10.5" fill="#666">expose 6379 (not published)</text>

  <rect x="145" y="480" width="260" height="24" rx="4" fill="#fff4e6" stroke="#f0b429"/>
  <text x="275" y="496" text-anchor="middle" font-size="10" fill="#7a4a00">maxmemory: ${REDIS_MAXMEMORY} (256mb default)</text>

  <rect x="145" y="510" width="260" height="24" rx="4" fill="#fff4e6" stroke="#f0b429"/>
  <text x="275" y="526" text-anchor="middle" font-size="10" fill="#7a4a00">maxmemory-policy: allkeys-lru</text>

  <rect x="145" y="540" width="260" height="24" rx="4" fill="#f7f9ff" stroke="#c3cfff"/>
  <text x="275" y="556" text-anchor="middle" font-size="10" fill="#333">cache_hit / cache_miss logged</text>

  <!-- Postgres -->
  <rect x="500" y="430" width="270" height="150" rx="6" fill="#ffffff" stroke="#e85d75" stroke-width="1.5"/>
  <text x="635" y="452" text-anchor="middle" font-size="12.5" font-weight="bold" fill="#1a1a2e">postgres:15-alpine</text>
  <text x="635" y="467" text-anchor="middle" font-size="10.5" fill="#666">expose 5432 (not published)</text>

  <rect x="515" y="480" width="240" height="24" rx="4" fill="#f7f9ff" stroke="#c3cfff"/>
  <text x="635" y="496" text-anchor="middle" font-size="10" fill="#333">healthcheck: pg_isready</text>

  <rect x="515" y="510" width="240" height="24" rx="4" fill="#f7f9ff" stroke="#c3cfff"/>
  <text x="635" y="526" text-anchor="middle" font-size="10" fill="#333">volume: postgres_data</text>

  <!-- Bottom notes -->
  <rect x="90" y="635" width="720" height="26" rx="4" fill="#f5f5f5" stroke="#ccc"/>
  <text x="450" y="652" text-anchor="middle" font-size="10.5" fill="#444">docker-compose.prod.yml overlay: mem_limit/cpus + bounded log rotation (10m × 3 files) per service</text>

  <text x="450" y="690" text-anchor="middle" font-size="10" fill="#888">See docs/decisions/ for ADRs · CHANGELOG.md for full history · tag: phase-1-foundation</text>
</svg>
